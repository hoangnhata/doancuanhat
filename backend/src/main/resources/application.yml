spring:
  application:
    name: expense-manager-api

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  # Gửi email OTP. Nếu MAIL_USERNAME/MAIL_PASSWORD trống → EmailService log OTP ra console (dev mode).
  # Việc gửi mail chạy nền (@Async EmailService) — request handler không bị block.
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:nhathoang0912204@gmail.com}
    password: ${MAIL_PASSWORD:suurzlqyagdyshwd}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          # Timeout (ms) — tránh SMTP treo vô hạn khi mạng chậm hoặc Gmail throttle.
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

  datasource:
    url: jdbc:mysql://localhost:3307/expense_manager?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Ho_Chi_Minh

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration-ms: 86400000  # 24 hours
  refresh-expiration-ms: 604800000  # 7 days

# AI Categorization - Support OpenAI or custom Python API
ai:
  categorization:
    enabled: true
    provider: python-api  # openai | python-api
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: gpt-3.5-turbo
      endpoint: https://api.openai.com/v1/chat/completions
    python-api:
      base-url: ${PYTHON_AI_API_URL:http://localhost:8000}
      categorize-endpoint: /api/categorize

  forecast:
    enabled: true
    # Cùng host với mô hình phân loại (FastAPI ai_service)
    endpoint: /api/forecast
    window-days: 30

  ocr:
    # FastAPI OCR endpoint — cùng host ai.categorization.python-api.base-url
    parse-endpoint: /api/ocr/receipt/parse

  chat:
    # FastAPI chatbot endpoint (Gemini hoặc rule-based)
    endpoint: /api/chat
    # Số ngày giao dịch gần đây gửi kèm làm context
    history-days: ${AI_CHAT_HISTORY_DAYS:45}

# Server
server:
  port: 8080
  servlet:
    context-path: /api

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging
logging:
  level:
    root: INFO
    com.expense: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Pagination + seed tài khoản demo AI (ai.demo@local.test / Demo@123456). Production: SEED_DEMO_USER=false
app:
  seed:
    demo-user-enabled: ${SEED_DEMO_USER:true}
    demo-history-days: 45
  pagination:
    default-page-size: 20
    max-page-size: 100
  password-reset:
    # Khi spring.mail chưa cấu hình → log OTP ra console (chỉ bật ở dev). Production: false.
    dev-log-otp: ${PASSWORD_RESET_DEV_LOG_OTP:true}
