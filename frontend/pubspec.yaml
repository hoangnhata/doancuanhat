name: expense_manager
description: Ứng dụng quản lý chi tiêu cá nhân - Natta AI
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.4.9

  # HTTP & Storage
  dio: ^5.4.0
  shared_preferences: ^2.2.2

  # UI
  fl_chart: ^0.66.0
  intl: ^0.19.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Utils
  equatable: ^2.0.5
  flutter_local_notifications: ^17.2.0
  timezone: ^0.9.2
  flutter_timezone: ^4.1.0
  drift: ^2.32.1
  path_provider: ^2.1.5
  path: ^1.9.1
  connectivity_plus: ^7.1.0
  uuid: ^4.5.3
  collection: ^1.19.1
  share_plus: ^10.1.4
  permission_handler: ^11.4.0
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  drift_dev: ^2.32.1
  build_runner: ^2.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#0288D1"
  adaptive_icon_foreground: assets/images/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
